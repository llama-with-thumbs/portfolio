<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="100%" style="stop-color:#172a45"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- 4x4 puzzle grid -->
  <g transform="translate(250,45)">
    <!-- Tiles -->
    <rect x="0" y="0" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="44" y="52" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">1</text>

    <rect x="94" y="0" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="138" y="52" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">2</text>

    <rect x="188" y="0" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="232" y="52" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">3</text>

    <rect x="0" y="94" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="44" y="146" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">4</text>

    <rect x="94" y="94" width="88" height="88" rx="8" fill="#e63946" stroke="#e63946" stroke-width="1.5" opacity="0.9"/>
    <text x="138" y="146" text-anchor="middle" fill="#fff" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">5</text>

    <rect x="188" y="94" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="232" y="146" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">6</text>

    <rect x="0" y="188" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="44" y="240" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">7</text>

    <rect x="94" y="188" width="88" height="88" rx="8" fill="#1d3557" stroke="#457b9d" stroke-width="1.5"/>
    <text x="138" y="240" text-anchor="middle" fill="#a8dadc" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="600">8</text>

    <!-- Empty slot -->
    <rect x="188" y="188" width="88" height="88" rx="8" fill="none" stroke="#457b9d" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

    <!-- Slide arrow hint -->
    <g transform="translate(232,168)" fill="none" stroke="#e63946" stroke-width="2" opacity="0.6">
      <line x1="0" y1="0" x2="0" y2="16"/>
      <polyline points="-5,11 0,16 5,11"/>
    </g>
  </g>
  <!-- Move counter -->
  <text x="400" y="400" text-anchor="middle" fill="#457b9d" font-family="Inter,system-ui,sans-serif" font-size="14" opacity="0.6">Moves: 42</text>
</svg>