<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Back card (shadow/stack effect) -->
  <rect x="285" y="68" width="230" height="310" rx="14" fill="#0f3460" opacity="0.5" transform="rotate(-6,400,225)"/>
  <!-- Front card -->
  <rect x="285" y="68" width="230" height="310" rx="14" fill="#1d3557" stroke="#457b9d" stroke-width="1.5" transform="rotate(3,400,225)"/>
  <!-- Card content area -->
  <g transform="rotate(3,400,225)">
    <line x1="310" y1="180" x2="490" y2="180" stroke="#457b9d" stroke-width="1" opacity="0.4"/>
    <!-- Word on front -->
    <text x="400" y="150" text-anchor="middle" fill="#e0e0e0" font-family="Inter,serif" font-size="28" font-weight="600">Apple</text>
    <!-- Phonetic -->
    <text x="400" y="210" text-anchor="middle" fill="#457b9d" font-family="Inter,sans-serif" font-size="15" font-style="italic">/ˈæp.əl/</text>
    <!-- Category badge -->
    <rect x="355" y="240" width="90" height="26" rx="13" fill="#e94560" opacity="0.8"/>
    <text x="400" y="258" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="12" font-weight="500">Food</text>
    <!-- Flip hint -->
    <g transform="translate(400,320)" opacity="0.4">
      <text x="0" y="0" text-anchor="middle" fill="#a0a0a0" font-family="Inter,sans-serif" font-size="11">tap to flip</text>
      <path d="M-8,8 C-8,14 8,14 8,8" fill="none" stroke="#a0a0a0" stroke-width="1"/>
      <polyline points="6,5 8,8 11,6" fill="none" stroke="#a0a0a0" stroke-width="1"/>
    </g>
  </g>
  <!-- Progress dots at bottom -->
  <g transform="translate(360,420)">
    <circle cx="0" cy="0" r="4" fill="#e94560"/>
    <circle cx="16" cy="0" r="4" fill="#457b9d" opacity="0.5"/>
    <circle cx="32" cy="0" r="4" fill="#457b9d" opacity="0.5"/>
    <circle cx="48" cy="0" r="4" fill="#457b9d" opacity="0.5"/>
    <circle cx="64" cy="0" r="4" fill="#457b9d" opacity="0.5"/>
  </g>
</svg>