<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- 2x2 grid of mini project icons -->
  <!-- MusicTutor - music note -->
  <rect x="200" y="95" width="160" height="120" rx="12" fill="#1d3557" stroke="#2a3a5c" stroke-width="1"/>
  <g transform="translate(280,140)" fill="none" stroke="#e94560" stroke-width="2.5" stroke-linecap="round">
    <circle cx="0" cy="16" r="8" fill="#e94560" opacity="0.3"/>
    <line x1="8" y1="16" x2="8" y2="-20"/>
    <path d="M8,-20 C12,-24 20,-20 16,-14" fill="none"/>
  </g>
  <text x="280" y="198" text-anchor="middle" fill="#a0a0a0" font-family="Inter,sans-serif" font-size="11">MusicTutor</text>

  <!-- Ziz - ledger/accounting -->
  <rect x="440" y="95" width="160" height="120" rx="12" fill="#1d3557" stroke="#2a3a5c" stroke-width="1"/>
  <g transform="translate(520,130)" fill="none" stroke="#457b9d" stroke-width="2" stroke-linecap="round">
    <rect x="-18" y="-10" width="36" height="44" rx="3" fill="none"/>
    <line x1="-10" y1="2" x2="10" y2="2"/>
    <line x1="-10" y1="12" x2="10" y2="12"/>
    <line x1="-10" y1="22" x2="4" y2="22"/>
  </g>
  <text x="520" y="198" text-anchor="middle" fill="#a0a0a0" font-family="Inter,sans-serif" font-size="11">Ziz</text>

  <!-- Budget Math - chart bars -->
  <rect x="200" y="235" width="160" height="120" rx="12" fill="#1d3557" stroke="#2a3a5c" stroke-width="1"/>
  <g transform="translate(252,265)" fill="#533483" opacity="0.8">
    <rect x="0" y="30" width="14" height="30" rx="2"/>
    <rect x="20" y="14" width="14" height="46" rx="2"/>
    <rect x="40" y="24" width="14" height="36" rx="2" fill="#e94560"/>
  </g>
  <text x="280" y="338" text-anchor="middle" fill="#a0a0a0" font-family="Inter,sans-serif" font-size="11">Budget Math</text>

  <!-- Timely-Notify - calendar -->
  <rect x="440" y="235" width="160" height="120" rx="12" fill="#1d3557" stroke="#2a3a5c" stroke-width="1"/>
  <g transform="translate(495,265)" fill="none" stroke="#457b9d" stroke-width="2" stroke-linecap="round">
    <rect x="-20" y="-6" width="40" height="38" rx="4" fill="none"/>
    <line x1="-20" y1="6" x2="20" y2="6"/>
    <line x1="-10" y1="-12" x2="-10" y2="0"/>
    <line x1="10" y1="-12" x2="10" y2="0"/>
    <circle cx="-6" cy="18" r="3" fill="#e94560" stroke="none"/>
    <circle cx="8" cy="18" r="3" fill="none" stroke="#457b9d" stroke-width="1.5"/>
  </g>
  <text x="520" y="338" text-anchor="middle" fill="#a0a0a0" font-family="Inter,sans-serif" font-size="11">Timely-Notify</text>

  <!-- Plus hint -->
  <text x="400" y="410" text-anchor="middle" fill="#457b9d" font-family="Inter,sans-serif" font-size="14" opacity="0.5">+ more</text>
</svg>