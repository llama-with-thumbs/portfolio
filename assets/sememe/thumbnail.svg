<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Network graph nodes -->
  <circle cx="400" cy="200" r="38" fill="#e94560" opacity="0.9"/>
  <circle cx="250" cy="130" r="24" fill="#533483" opacity="0.85"/>
  <circle cx="550" cy="140" r="28" fill="#533483" opacity="0.85"/>
  <circle cx="180" cy="260" r="20" fill="#0f3460" opacity="0.8"/>
  <circle cx="320" cy="320" r="22" fill="#0f3460" opacity="0.8"/>
  <circle cx="500" cy="300" r="26" fill="#533483" opacity="0.85"/>
  <circle cx="620" cy="250" r="18" fill="#0f3460" opacity="0.8"/>
  <circle cx="150" cy="160" r="14" fill="#0f3460" opacity="0.7"/>
  <circle cx="650" cy="160" r="16" fill="#0f3460" opacity="0.7"/>
  <!-- Edges -->
  <line x1="400" y1="200" x2="250" y2="130" stroke="#e94560" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="200" x2="550" y2="140" stroke="#e94560" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="200" x2="320" y2="320" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  <line x1="400" y1="200" x2="500" y2="300" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  <line x1="250" y1="130" x2="180" y2="260" stroke="#533483" stroke-width="1.5" opacity="0.3"/>
  <line x1="250" y1="130" x2="150" y2="160" stroke="#533483" stroke-width="1" opacity="0.25"/>
  <line x1="550" y1="140" x2="620" y2="250" stroke="#533483" stroke-width="1.5" opacity="0.3"/>
  <line x1="550" y1="140" x2="650" y2="160" stroke="#533483" stroke-width="1" opacity="0.25"/>
  <line x1="500" y1="300" x2="620" y2="250" stroke="#0f3460" stroke-width="1" opacity="0.25"/>
  <line x1="320" y1="320" x2="180" y2="260" stroke="#0f3460" stroke-width="1" opacity="0.25"/>
  <!-- Microphone icon in center node -->
  <g transform="translate(400,200)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
    <rect x="-8" y="-16" width="16" height="24" rx="8" fill="none"/>
    <path d="M-14,4 C-14,14 -4,22 0,22 C4,22 14,14 14,4"/>
    <line x1="0" y1="22" x2="0" y2="28"/>
    <line x1="-6" y1="28" x2="6" y2="28"/>
  </g>
  <!-- Node labels -->
  <text x="400" y="255" text-anchor="middle" fill="#e0e0e0" font-family="Inter,system-ui,sans-serif" font-size="13" opacity="0.7">Topic Map</text>
  <text x="250" y="108" text-anchor="middle" fill="#c0c0c0" font-family="Inter,system-ui,sans-serif" font-size="11" opacity="0.6">themes</text>
  <text x="550" y="118" text-anchor="middle" fill="#c0c0c0" font-family="Inter,system-ui,sans-serif" font-size="11" opacity="0.6">keywords</text>
  <!-- Waveform hint at bottom -->
  <g transform="translate(300,390)" stroke="#e94560" stroke-width="2" opacity="0.3" fill="none">
    <polyline points="0,0 10,-8 20,6 30,-12 40,10 50,-6 60,8 70,-10 80,4 90,-8 100,6 110,-4 120,8 130,-6 140,2 150,-8 160,6 170,-2 180,4 190,-6 200,0"/>
  </g>
</svg>